name: Run Discord Bot

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

concurrency:
  group: birthday-bot
  cancel-in-progress: true

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Restore birthday state
        uses: actions/cache/restore@v4
        with:
          path: birthday_state.json
          key: birthday-state

      - name: Run bot
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          TIMEZONE: America/New_York
        run: |
          python main.py

      - name: Save birthday state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: birthday_state.json
          key: birthday-state
